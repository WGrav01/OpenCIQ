name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: codeberg-small

    steps:
      - name: Checkout repository
        uses: https://code.forgejo.org/actions/checkout@v6

      - name: Set up Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          components: clippy,llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: https://github.com/taiki-e/install-action@cargo-llvm-cov

      - name: Install nextest
        uses: https://github.com/taiki-e/install-action@nextest

      - name: Run tests and collect coverage data
        run: cargo llvm-cov nextest --profile ci

      - name: Generate LCOV report
        run: cargo llvm-cov --cobertura --output-path lcov.xml

      - name: SonarQube Upload And Scan
        if: ${{ !cancelled() }}
        uses: https://github.com/SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: --define sonar.coverageReportPaths=./lcov.xml
