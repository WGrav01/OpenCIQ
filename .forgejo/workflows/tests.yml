name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: codeberg-small-lazy

    steps:
      - name: Checkout repository
        uses: https://code.forgejo.org/actions/checkout@v6

      - name: Set up Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: https://github.com/taiki-e/install-action@cargo-llvm-cov

      - name: Install nextest
        uses: https://github.com/taiki-e/install-action@nextest

      - name: Collect coverage data
        run: cargo llvm-cov nextest --profile ci

      - name: Generate LCOV report
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload test results and coverage to Codecov
        if: ${{ !cancelled() }}
        uses: https://github.com/codecov/codecov-action@v6
        with:
          files: ./target/nextest/ci/junit.xml,./lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: --define sonar.coverageReportPaths ./lcov.info
